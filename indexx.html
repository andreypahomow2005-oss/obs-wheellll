<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Праздничное Колесо Фортуны — Casino Jackpot Edition</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: transparent; /* Прозрачный фон для OBS */
            overflow: hidden;
            color: #fff;
        }

        /* Холст для праздничного конфетти */
        #confettiCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 99;
        }

        /* Кнопка настроек в ЛЕВОМ ВЕРХНЕМ УГЛУ */
        .settings-toggle {
            position: fixed;
            top: 15px;
            left: 15px;
            background: rgba(35, 0, 10, 0.9);
            border: 2px solid #ffcc00;
            color: #fff;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            z-index: 100;
            box-shadow: 0 0 15px rgba(255, 204, 0, 0.5);
            transition: 0.2s;
        }

        .settings-toggle:hover {
            background: rgba(255, 204, 0, 0.3);
            transform: scale(1.05);
        }

        /* Кнопка управления фоновой музыкой */
        .music-toggle {
            position: fixed;
            top: 15px;
            left: 160px;
            background: rgba(35, 0, 10, 0.9);
            border: 2px solid #ff1a53;
            color: #fff;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            z-index: 100;
            box-shadow: 0 0 15px rgba(255, 26, 83, 0.5);
            transition: 0.2s;
        }

        .music-toggle:hover {
            background: rgba(255, 26, 83, 0.3);
            transform: scale(1.05);
        }

        /* Настройки */
        .settings-panel {
            display: none;
            position: fixed;
            top: 65px;
            left: 15px;
            background: rgba(35, 0, 10, 0.98);
            border: 2px solid #ffcc00;
            padding: 20px;
            border-radius: 15px;
            z-index: 100;
            box-shadow: 0 10px 40px rgba(255,0,85,0.8);
            width: 300px;
        }

        .settings-panel h3 {
            margin-top: 0;
            color: #ffea85;
        }

        .settings-panel textarea {
            width: 100%;
            height: 180px;
            background: #150005;
            color: #ffe6ec;
            border: 1px solid #ff1a53;
            border-radius: 8px;
            padding: 10px;
            box-sizing: border-box;
            resize: vertical;
            font-family: inherit;
        }

        .settings-panel button {
            width: 100%;
            margin-top: 12px;
            padding: 10px;
            background: linear-gradient(90deg, #ff1a53, #ffcc00);
            color: #000;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }

        .settings-panel button:hover {
            filter: brightness(1.2);
        }

        /* Праздничная плашка */
        .title-banner {
            position: relative;
            background: linear-gradient(135deg, #a8002a 0%, #ff1a53 50%, #590014 100%);
            background-size: 200% 200%;
            border: 3px solid #ffe600;
            animation: headerGlow 3s infinite alternate ease-in-out, bgShift 6s infinite alternate ease-in-out;
            border-radius: 30px;
            padding: 12px 50px;
            font-size: 32px;
            font-weight: 900;
            color: #ffffff;
            letter-spacing: 3px;
            text-shadow: 0 0 10px #ffea85, 0 2px 5px rgba(0,0,0,0.8);
            margin-bottom: 20px;
            z-index: 10;
        }

        @keyframes bgShift {
            0% { background-position: 0% 50%; }
            100% { background-position: 100% 50%; }
        }

        @keyframes headerGlow {
            0% { box-shadow: 0 0 20px #ff0055, 0 0 40px #ffcc00, inset 0 0 15px #ff0055; }
            100% { box-shadow: 0 0 35px #ffcc00, 0 0 60px #ff0055, inset 0 0 25px #ffcc00; }
        }

        /* Контейнер колеса */
        .wheel-container {
            position: relative;
            width: 660px;
            height: 660px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Обод с неоновым свечением */
        .wheel-frame {
            position: absolute;
            width: 660px;
            height: 660px;
            border-radius: 50%;
            background: radial-gradient(circle, #3d000f 0%, #1a0006 100%);
            border: 14px solid #a8002a;
            animation: rimGlow 2.5s infinite alternate ease-in-out;
            box-sizing: border-box;
            transition: 0.3s;
        }

        @keyframes rimGlow {
            0% { box-shadow: 0 0 25px #ff1a53, inset 0 0 20px #ff1a53, 0 0 50px rgba(255, 204, 0, 0.4); border-color: #a8002a; }
            100% { box-shadow: 0 0 45px #ffcc00, inset 0 0 30px #ff0055, 0 0 75px rgba(255, 0, 85, 0.8); border-color: #d40035; }
        }

        /* ГИПЕР-СВЕЧЕНИЕ ВО ВРЕМЯ КРУЧЕНИЯ */
        .wheel-container.spinning .wheel-frame {
            animation: hyperRimGlow 0.3s infinite alternate ease-in-out !important;
        }

        @keyframes hyperRimGlow {
            0% { box-shadow: 0 0 50px #ff1a53, inset 0 0 35px #ffcc00, 0 0 90px #ff0055; border-color: #ffcc00; }
            100% { box-shadow: 0 0 90px #ffcc00, inset 0 0 60px #ff0055, 0 0 130px #ffffff; border-color: #ffffff; }
        }

        /* Гирлянда */
        #garlandContainer {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            pointer-events: none;
        }

        .bulb {
            position: absolute;
            width: 14px;
            height: 14px;
            border-radius: 50%;
        }

        .bulb.p1 { animation: blinkP1 0.9s infinite linear; }
        .bulb.p2 { animation: blinkP2 0.9s infinite linear; }
        .bulb.p3 { animation: blinkP3 0.9s infinite linear; }

        .wheel-container.spinning .bulb {
            animation-duration: 0.25s !important;
        }

        @keyframes blinkP1 {
            0%, 100% { opacity: 1; background: #ffffff; box-shadow: 0 0 12px #fff, 0 0 25px #ffea85; transform: scale(1.15); }
            33% { opacity: 0.3; background: #590014; box-shadow: none; transform: scale(0.85); }
            66% { opacity: 0.8; background: #ff1a53; box-shadow: 0 0 10px #ff1a53; }
        }

        @keyframes blinkP2 {
            0% { opacity: 0.8; background: #ff1a53; box-shadow: 0 0 10px #ff1a53; }
            33%, 100% { opacity: 1; background: #ffcc00; box-shadow: 0 0 12px #ffcc00, 0 0 25px #ffea85; transform: scale(1.15); }
            66% { opacity: 0.3; background: #590014; box-shadow: none; transform: scale(0.85); }
        }

        @keyframes blinkP3 {
            0% { opacity: 0.3; background: #590014; box-shadow: none; transform: scale(0.85); }
            33% { opacity: 0.8; background: #ff1a53; box-shadow: 0 0 10px #ff1a53; }
            66%, 100% { opacity: 1; background: #ffffff; box-shadow: 0 0 12px #fff, 0 0 25px #ffea85; transform: scale(1.15); }
        }

        /* Крупные клубнички на ободе */
        .rim-strawberry {
            position: absolute;
            width: 42px;
            height: 42px;
            z-index: 8;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.9));
            pointer-events: none;
        }

        /* Золотой указатель */
        .pointer {
            position: absolute;
            top: -12px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 22px solid transparent;
            border-right: 22px solid transparent;
            border-top: 44px solid #ffcc00;
            z-index: 25;
            filter: drop-shadow(0 0 10px #ffea85) drop-shadow(0 5px 10px rgba(0,0,0,0.9));
            animation: pointerPulse 1.5s infinite alternate;
        }

        @keyframes pointerPulse {
            0% { transform: translateX(-50%) scale(1); }
            100% { transform: translateX(-50%) scale(1.08); }
        }

        .pointer::after {
            content: '';
            position: absolute;
            top: -42px;
            left: -13px;
            width: 0;
            height: 0;
            border-left: 13px solid transparent;
            border-right: 13px solid transparent;
            border-top: 26px solid #ffffff;
        }

        #wheelCanvas {
            width: 580px;
            height: 580px;
            border-radius: 50%;
            z-index: 5;
        }

        /* Котик в центре */
        .center-cat-wrapper {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 145px;
            height: 145px;
            border-radius: 50%;
            border: 6px solid #ffcc00;
            z-index: 20;
            background: #ffb3c6;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s;
            animation: catRingGlow 1.8s infinite alternate ease-in-out;
        }

        @keyframes catRingGlow {
            0% { box-shadow: 0 0 20px #ff0055, 0 0 35px #ffcc00, inset 0 0 15px rgba(0,0,0,0.6); border-color: #ffcc00; }
            100% { box-shadow: 0 0 45px #ffcc00, 0 0 75px #ff0055, 0 0 100px #ff1a53, inset 0 0 25px #ffea85; border-color: #ffffff; }
        }

        .wheel-container.spinning .center-cat-wrapper {
            animation: catHyperGlow 0.25s infinite alternate ease-in-out !important;
        }

        @keyframes catHyperGlow {
            0% { transform: translate(-50%, -50%) scale(1); box-shadow: 0 0 40px #ff0055, 0 0 70px #ffcc00; border-color: #ffcc00; }
            100% { transform: translate(-50%, -50%) scale(1.09); box-shadow: 0 0 80px #ffcc00, 0 0 120px #ffffff; border-color: #ffffff; }
        }

        .center-cat-wrapper:hover {
            transform: translate(-50%, -50%) scale(1.08);
        }

        .center-cat-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Всплывающее окно */
        .modal {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(135deg, #70001c 0%, #30000c 100%);
            border: 4px solid #ffcc00;
            border-radius: 25px;
            padding: 35px;
            text-align: center;
            box-shadow: 0 0 60px rgba(255, 204, 0, 0.8), 0 0 100px rgba(255, 0, 85, 0.6);
            z-index: 30;
            width: 360px;
            color: #ffffff;
            animation: modalPop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes modalPop {
            0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        }

        .modal h2 {
            margin: 0 0 15px 0;
            font-size: 28px;
            letter-spacing: 3px;
            color: #ffea85;
            text-shadow: 0 0 10px #ffcc00;
        }

        .modal p {
            margin: 0;
            font-size: 24px;
            font-weight: bold;
            color: #ffffff;
        }

        .modal-close {
            margin-top: 25px;
            padding: 12px 30px;
            background: linear-gradient(90deg, #ff1a53, #ffcc00);
            color: #000;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            font-size: 18px;
            transition: 0.2s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        
        .modal-close:hover {
            transform: scale(1.05);
            filter: brightness(1.2);
        }
    </style>
</head>
<body>

    <canvas id="confettiCanvas"></canvas>

    <!-- Кнопки в левом верхнем углу -->
    <button class="settings-toggle" onclick="toggleSettings()">⚙️ Настройки</button>
    <button class="music-toggle" id="musicBtn" onclick="toggleBackgroundMusic()">🎵 Музыка: Вкл</button>

    <!-- Шапка -->
    <div class="title-banner">
        ДА ДА НЕТ НЕТ
    </div>

    <!-- Редактор призов -->
    <div class="settings-panel" id="settingsPanel">
        <h3>Редактор призов</h3>
        <p style="font-size: 12px; margin-top: 0; color: #aaa;">Каждый приз с новой строки:</p>
        <textarea id="prizeInput"></textarea>
        <button onclick="savePrizes()">Сохранить и обновить</button>
    </div>

    <div class="wheel-container" id="wheelContainer">
        <div class="wheel-frame"></div>
        <div id="garlandContainer"></div>
        <div id="strawberriesRimContainer"></div>
        <div class="pointer"></div>
        
        <canvas id="wheelCanvas" width="800" height="800"></canvas>
        
        <!-- Кот в очках -->
        <div class="center-cat-wrapper" id="spinButton" title="Крутить!">
            <img src="https://images.unsplash.com/photo-1533738363-b7f9aef128ce?w=400&auto=format&fit=crop&q=80" alt="Котик">
        </div>
    </div>

    <div class="modal" id="resultModal">
        <h2>🎉 П Р И З 🎉</h2>
        <p id="resultText">Выигрыш!</p>
        <button class="modal-close" onclick="closeModal()">УРА!</button>
    </div>

    <script>
        const canvas = document.getElementById("wheelCanvas");
        const ctx = canvas.getContext("2d");
        const modal = document.getElementById("resultModal");
        const resultText = document.getElementById("resultText");
        const prizeInput = document.getElementById("prizeInput");
        const settingsPanel = document.getElementById("settingsPanel");
        const spinButton = document.getElementById("spinButton");
        const musicBtn = document.getElementById("musicBtn");
        const wheelContainer = document.getElementById("wheelContainer");

        const strawberryImg = new Image();
        strawberryImg.src = "data:image/svg+xml;utf8," + encodeURIComponent(`
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
                <defs>
                    <radialGradient id="berryGrad" cx="35%" cy="30%" r="65%">
                        <stop offset="0%" stop-color="#ff4d6d"/>
                        <stop offset="40%" stop-color="#e60039"/>
                        <stop offset="85%" stop-color="#80001a"/>
                        <stop offset="100%" stop-color="#4a000f"/>
                    </radialGradient>
                    <linearGradient id="leafGrad" x1="0" y1="0" x2="0" y2="1">
                        <stop offset="0%" stop-color="#52b788"/>
                        <stop offset="100%" stop-color="#1b4332"/>
                    </linearGradient>
                </defs>
                <path d="M50,92 C68,82 85,62 85,42 C85,25 70,20 50,26 C30,20 15,25 15,42 C15,62 32,82 50,92 Z" fill="url(#berryGrad)"/>
                <path d="M50,25 Q58,10 70,12 Q58,22 55,27 Q68,26 75,32 Q60,33 52,28 Q50,38 48,28 Q40,33 25,32 Q32,26 45,27 Q42,22 30,12 Q42,10 50,25 Z" fill="url(#leafGrad)"/>
                <ellipse cx="32" cy="38" rx="8" ry="14" fill="#ffffff" opacity="0.28" transform="rotate(-20 32 38)"/>
                <circle cx="35" cy="50" r="1.8" fill="#ffe600"/>
                <circle cx="50" cy="52" r="1.8" fill="#ffe600"/>
                <circle cx="65" cy="48" r="1.8" fill="#ffe600"/>
                <circle cx="42" cy="65" r="1.8" fill="#ffe600"/>
                <circle cx="58" cy="63" r="1.8" fill="#ffe600"/>
                <circle cx="50" cy="78" r="1.5" fill="#ffe600"/>
                <circle cx="28" cy="62" r="1.5" fill="#ffe600"/>
                <circle cx="72" cy="60" r="1.5" fill="#ffe600"/>
            </svg>
        `);

        // Аудио
        let audioCtx = null;
        let isMusicPlaying = false;
        let bgMusicTimer = null;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        // Динамичный игровой фоновый трек в стиле настольных / мобильных игр (Monopoly Go Style)
        const monopolyBass = [130.81, 146.83, 164.81, 196.00, 220.00, 196.00, 164.81, 146.83];
        const monopolyLead = [523.25, 659.25, 783.99, 1046.50, 880.00, 783.99, 659.25, 587.33];
        let mStep = 0;

        function startBackgroundMusic() {
            if (isMusicPlaying) return;
            initAudio();
            isMusicPlaying = true;
            
            bgMusicTimer = setInterval(() => {
                if (!isMusicPlaying || !audioCtx) return;
                try {
                    const now = audioCtx.currentTime;

                    const bassOsc = audioCtx.createOscillator();
                    const bassGain = audioCtx.createGain();
                    bassOsc.type = 'triangle';
                    bassOsc.frequency.setValueAtTime(monopolyBass[mStep % monopolyBass.length], now);
                    bassGain.gain.setValueAtTime(0.07, now);
                    bassGain.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
                    bassOsc.connect(bassGain);
                    bassGain.connect(audioCtx.destination);
                    bassOsc.start(now);
                    bassOsc.stop(now + 0.1);

                    const leadOsc = audioCtx.createOscillator();
                    const leadGain = audioCtx.createGain();
                    leadOsc.type = 'sine';
                    leadOsc.frequency.setValueAtTime(monopolyLead[mStep % monopolyLead.length], now);
                    leadGain.gain.setValueAtTime(0.03, now);
                    leadGain.gain.exponentialRampToValueAtTime(0.001, now + 0.08);
                    leadOsc.connect(leadGain);
                    leadGain.connect(audioCtx.destination);
                    leadOsc.start(now);
                    leadOsc.stop(now + 0.08);

                    mStep++;
                } catch(e) {}
            }, 115);
        }

        function stopBackgroundMusic() {
            isMusicPlaying = false;
            if (bgMusicTimer) clearInterval(bgMusicTimer);
        }

        function toggleBackgroundMusic() {
            if (isMusicPlaying) {
                stopBackgroundMusic();
                musicBtn.innerText = "🎵 Музыка: Выкл";
                musicBtn.style.borderColor = "#888";
            } else {
                startBackgroundMusic();
                musicBtn.innerText = "🎵 Музыка: Вкл";
                musicBtn.style.borderColor = "#ff1a53";
            }
        }

        let tickSparks = [];
        function createTickSparks() {
            for (let i = 0; i < 8; i++) {
                tickSparks.push({
                    x: canvas.width / 2,
                    y: 35,
                    vx: (Math.random() - 0.5) * 12,
                    vy: Math.random() * 8 + 2,
                    size: Math.random() * 6 + 3,
                    color: Math.random() > 0.4 ? '#ffea85' : '#ff1a53',
                    life: 1.0
                });
            }
        }

        // Звук трещотки
        function playTickSound() {
            if (!audioCtx) return;
            try {
                const now = audioCtx.currentTime;
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'square';
                osc.frequency.setValueAtTime(450, now);
                osc.frequency.exponentialRampToValueAtTime(50, now + 0.02);
                gain.gain.setValueAtTime(0.2, now);
                gain.gain.exponentialRampToValueAtTime(0.001, now + 0.02);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start(now);
                osc.stop(now + 0.02);

                createTickSparks(); 
            } catch (e) {}
        }

        // КАЗИНО ДЖЕКППОТ ЗВУК: Множественные звонкие монеты с нарастанием и финальным аккордом
        function playWinSound() {
            if (!audioCtx) return;
            try {
                const now = audioCtx.currentTime;

                // 1. Быстрый каскад падающих монеток / звона (арпеджио вверх)
                const notes = [523.25, 659.25, 783.99, 1046.50, 1318.51, 1567.98, 2093.00];
                for (let i = 0; i < 28; i++) {
                    const startTime = now + (i * 0.05);
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.type = 'sine';
                    
                    const freq = notes[i % notes.length] * (1 + Math.floor(i / notes.length) * 0.1);
                    osc.frequency.setValueAtTime(freq, startTime);
                    
                    gain.gain.setValueAtTime(0.25, startTime);
                    gain.gain.exponentialRampToValueAtTime(0.001, startTime + 0.2);
                    
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.start(startTime);
                    osc.stop(startTime + 0.2);
                }

                // 2. Финальный победный аккорд джекпота
                const chordTime = now + 1.4;
                const chordFreqs = [523.25, 659.25, 783.99, 1046.50]; // До мажор
                chordFreqs.forEach(f => {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(f, chordTime);
                    
                    gain.gain.setValueAtTime(0.4, chordTime);
                    gain.gain.exponentialRampToValueAtTime(0.001, chordTime + 1.5);
                    
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.start(chordTime);
                    osc.stop(chordTime + 1.5);
                });

            } catch (e) {}
        }

        // Генерация гирлянды и увеличенного количества клубники по оправе
        const garlandContainer = document.getElementById("garlandContainer");
        const strawberriesRimContainer = document.getElementById("strawberriesRimContainer");
        const bulbCount = 40;
        const radius = 318;
        const center = 330;

        for (let i = 0; i < bulbCount; i++) {
            const angle = (i / bulbCount) * (2 * Math.PI);
            const x = center + radius * Math.cos(angle) - 7;
            const y = center + radius * Math.sin(angle) - 7;
            
            const bulb = document.createElement("div");
            const phaseClass = i % 3 === 0 ? 'p1' : (i % 3 === 1 ? 'p2' : 'p3');
            bulb.className = `bulb ${phaseClass}`;
            bulb.style.left = `${x}px`;
            bulb.style.top = `${y}px`;
            garlandContainer.appendChild(bulb);

            // Клубника по оправе теперь располагается чаще (каждые 2 лампочки вместо 5)
            if (i % 2 === 0) {
                const berry = document.createElement("img");
                berry.className = "rim-strawberry";
                berry.src = strawberryImg.src;
                berry.style.left = `${center + (radius + 2) * Math.cos(angle) - 21}px`;
                berry.style.top = `${center + (radius + 2) * Math.sin(angle) - 21}px`;
                strawberriesRimContainer.appendChild(berry);
            }
        }

        // 14 секторов по умолчанию
        let prizes = [
            "СРОЧНО ЛОЖИСЬ СПАТЬ", 
            "МОЖНО ВСЁ!", 
            "НИЧЕГО НЕ ДЕЛАТЬ", 
            "СЕГОДНЯ ТВОЙ ДЕНЬ", 
            "ПОЗВОНИ КОМУ-НИБУДЬ", 
            "СМОТРИ СТРИМ КЛУБНИЧКИ", 
            "ДУМАЙ О ХОРОШЕМ", 
            "ВКУСНЯШКА",
            "РАЗЫГРАТЬ САБКУ",
            "СИГНА В ЧАТ",
            "ИГРА НА ВЫБОР",
            "VIP НА СТРИМ",
            "ЛУЧШИЙ МОДЕРАТОР",
            "ОСОБЫЙ РЕСПЕКТ"
        ];

        prizeInput.value = prizes.join("\n");

        const colors = ["#a8002a", "#ffb3c6"]; 
        const textColors = ["#ffffff", "#600018"];
        let arc = Math.PI / (prizes.length / 2);
        
        let startAngle = 0;
        let spinTimeout = null;
        let spinAngleStart = 0;
        let spinTime = 0;
        let spinTimeTotal = 0;
        let lastSegmentIndex = -1;
        let isSpinning = false;
        let bgRaysAngle = 0;

        function drawWheel() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            if (isSpinning) {
                bgRaysAngle += 0.03;
                ctx.save();
                ctx.translate(canvas.width / 2, canvas.height / 2);
                ctx.rotate(bgRaysAngle);
                for (let r = 0; r < 14; r++) {
                    ctx.beginPath();
                    ctx.moveTo(0, 0);
                    ctx.arc(0, 0, canvas.width / 2, (r * Math.PI) / 7, ((r + 0.5) * Math.PI) / 7);
                    ctx.fillStyle = 'rgba(255, 230, 0, 0.08)';
                    ctx.fill();
                }
                ctx.restore();
            }

            for(let i = 0; i < prizes.length; i++) {
                const angle = startAngle + i * arc;
                
                ctx.fillStyle = colors[i % 2];
                ctx.beginPath();
                ctx.arc(canvas.width / 2, canvas.height / 2, canvas.width / 2, angle, angle + arc, false);
                ctx.lineTo(canvas.width / 2, canvas.height / 2);
                ctx.fill();

                ctx.strokeStyle = "#ffffff";
                ctx.lineWidth = 2;
                ctx.stroke();

                ctx.save();
                ctx.fillStyle = textColors[i % 2]; 
                ctx.translate(
                    canvas.width / 2 + Math.cos(angle + arc / 2) * (canvas.width / 2 - 58),
                    canvas.height / 2 + Math.sin(angle + arc / 2) * (canvas.height / 2 - 58)
                );
                ctx.rotate(angle + arc / 2 + Math.PI);
                ctx.textAlign = "left";
                ctx.textBaseline = "middle";
                ctx.font = "bold 13px 'Segoe UI', Arial";
                
                let text = prizes[i];
                if (text.length > 18) text = text.substring(0, 15) + "...";
                
                ctx.fillText(text, 0, 0);

                if (strawberryImg.complete) {
                    ctx.drawImage(strawberryImg, -36, -13, 26, 26);
                }

                ctx.restore();
            }

            for (let i = tickSparks.length - 1; i >= 0; i--) {
                const s = tickSparks[i];
                ctx.fillStyle = s.color;
                ctx.globalAlpha = s.life;
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1.0;

                s.x += s.vx;
                s.y += s.vy;
                s.life -= 0.04;
                if (s.life <= 0) tickSparks.splice(i, 1);
            }
        }

        function rotateWheel() {
            spinTime += 25;
            if(spinTime >= spinTimeTotal) {
                stopRotateWheel();
                return;
            }
            const spinAngle = spinAngleStart - easeOut(spinTime, 0, spinAngleStart, spinTimeTotal);
            startAngle += (spinAngle * Math.PI / 180);

            const currentSegment = Math.floor((startAngle / (2 * Math.PI)) * prizes.length) % prizes.length;
            if (currentSegment !== lastSegmentIndex) {
                playTickSound();
                lastSegmentIndex = currentSegment;
            }

            drawWheel();
            spinTimeout = requestAnimationFrame(rotateWheel);
        }

        function stopRotateWheel() {
            cancelAnimationFrame(spinTimeout);
            isSpinning = false;
            wheelContainer.classList.remove("spinning");

            const degrees = startAngle * 180 / Math.PI + 90;
            const arcd = arc * 180 / Math.PI;
            const index = Math.floor((360 - (degrees % 360 + 360) % 360) / arcd);
            
            resultText.innerText = prizes[index];
            modal.style.display = "block";
            spinButton.style.pointerEvents = "auto";
            
            playWinSound();
            launchConfetti();
            drawWheel();
        }

        function easeOut(t, b, c, d) {
            const ts = (t /= d) * t;
            const tc = ts * t;
            return b + c * (tc + -3 * ts + 3 * t);
        }

        spinButton.addEventListener("click", () => {
            if(modal.style.display === "block" || isSpinning) return;
            initAudio();
            if(!isMusicPlaying) startBackgroundMusic();
            
            isSpinning = true;
            wheelContainer.classList.add("spinning");
            spinButton.style.pointerEvents = "none";
            
            spinAngleStart = Math.random() * 3 + 8;
            spinTime = 0;
            spinTimeTotal = Math.random() * 8000 + 24000;
            rotateWheel();
        });

        document.body.addEventListener("click", () => {
            initAudio();
            if(!isMusicPlaying && musicBtn.innerText.includes("Вкл")) {
                startBackgroundMusic();
            }
        }, { once: true });

        function toggleSettings() {
            settingsPanel.style.display = settingsPanel.style.display === "block" ? "none" : "block";
        }

        function savePrizes() {
            const newPrizes = prizeInput.value.split('\n').map(p => p.trim()).filter(p => p !== "");
            if (newPrizes.length < 2) {
                alert("Укажите как минимум 2 приза!");
                return;
            }
            prizes = newPrizes;
            arc = Math.PI / (prizes.length / 2);
            startAngle = 0;
            drawWheel();
            toggleSettings();
        }

        function closeModal() {
            modal.style.display = "none";
        }

        const confettiCanvas = document.getElementById("confettiCanvas");
        const cCtx = confettiCanvas.getContext("2d");
        let confettiParticles = [];
        let confettiAnimationId = null;

        function launchConfetti() {
            confettiCanvas.width = window.innerWidth;
            confettiCanvas.height = window.innerHeight;
            confettiParticles = [];
            
            const confettiColors = ['#ff1a53', '#ffea85', '#ffffff', '#ffcc00', '#a8002a', '#ff758f', '#ffe600'];
            for (let i = 0; i < 450; i++) {
                confettiParticles.push({
                    x: window.innerWidth / 2 + (Math.random() - 0.5) * 80,
                    y: window.innerHeight / 2 - 20,
                    vx: (Math.random() - 0.5) * 28,
                    vy: Math.random() * -20 - 6,
                    size: Math.random() * 11 + 5,
                    color: confettiColors[Math.floor(Math.random() * confettiColors.length)],
                    rotation: Math.random() * 360,
                    vRot: (Math.random() - 0.5) * 15,
                    isCircle: Math.random() > 0.5
                });
            }
            if (confettiAnimationId) cancelAnimationFrame(confettiAnimationId);
            animateConfetti();
        }

        function animateConfetti() {
            cCtx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
            let active = false;

            confettiParticles.forEach(p => {
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.3;
                p.rotation += p.vRot;

                if (p.y < window.innerHeight) active = true;

                cCtx.save();
                cCtx.translate(p.x, p.y);
                cCtx.rotate((p.rotation * Math.PI) / 180);
                cCtx.fillStyle = p.color;

                if (p.isCircle) {
                    cCtx.beginPath();
                    cCtx.arc(0, 0, p.size / 2, 0, Math.PI * 2);
                    cCtx.fill();
                } else {
                    cCtx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size * 0.7);
                }
                
                cCtx.restore();
            });

            if (active) {
                confettiAnimationId = requestAnimationFrame(animateConfetti);
            } else {
                cCtx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
            }
        }

        strawberryImg.onload = () => {
            drawWheel();
        };
        drawWheel();
    </script>
</body>
</html>
